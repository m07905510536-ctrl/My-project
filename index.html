<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXUS AGENCY — وكالة رقمية متطورة</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;700&family=Tajawal:wght@300;400;500;700;800;900&family=Orbitron:wght@400;700;900&family=Cairo+Play:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-void: #020408;
      --bg-deep: #060c14;
      --bg-surface: #0a1220;
      --bg-elevated: #0f1a2e;
      --bg-card: #0d1728;
      --border-dim: rgba(0, 200, 255, 0.08);
      --border-subtle: rgba(0, 200, 255, 0.15);
      --border-active: rgba(0, 200, 255, 0.5);
      --cyan: #00c8ff;
      --cyan-dim: rgba(0, 200, 255, 0.6);
      --cyan-glow: rgba(0, 200, 255, 0.15);
      --cyan-deep: rgba(0, 200, 255, 0.05);
      --electric: #0ff;
      --gold: #f0a500;
      --text-primary: #e8f4ff;
      --text-secondary: #7a9bbf;
      --text-muted: #3d5a7a;
      --font-display: 'Orbitron', monospace;
      --font-arabic: 'Tajawal', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg-void);
      color: var(--text-primary);
      font-family: var(--font-arabic);
      overflow-x: hidden;
      cursor: none;
    }

    /* CUSTOM CURSOR */
    .cursor-dot {
      width: 6px; height: 6px;
      background: var(--cyan);
      border-radius: 50%;
      position: fixed; top: 0; left: 0;
      pointer-events: none; z-index: 99999;
      transform: translate(-50%, -50%);
      transition: transform 0.05s;
      box-shadow: 0 0 10px var(--cyan), 0 0 20px var(--cyan);
    }
    .cursor-ring {
      width: 32px; height: 32px;
      border: 1px solid var(--border-active);
      border-radius: 50%;
      position: fixed; top: 0; left: 0;
      pointer-events: none; z-index: 99998;
      transform: translate(-50%, -50%);
      transition: transform 0.12s ease, width 0.2s, height 0.2s, border-color 0.2s;
    }
    .cursor-ring.hovering {
      width: 48px; height: 48px;
      border-color: var(--cyan);
      background: rgba(0, 200, 255, 0.05);
    }

    /* NOISE TEXTURE OVERLAY */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.4;
    }

    /* GRID BACKGROUND */
    .grid-bg {
      position: fixed; inset: 0; z-index: 0; overflow: hidden;
      background-image:
        linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
    }

    /* SCANLINE EFFECT */
    .scanlines {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0, 0, 0, 0.08) 2px, rgba(0, 0, 0, 0.08) 4px
      );
    }

    #root { position: relative; z-index: 2; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-void); }
    ::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 2px; }

    /* ANIMATIONS */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes glitch {
      0%, 100% { clip-path: inset(0 0 100% 0); transform: translateX(0); }
      20% { clip-path: inset(20% 0 60% 0); transform: translateX(-4px); }
      40% { clip-path: inset(50% 0 30% 0); transform: translateX(4px); }
      60% { clip-path: inset(70% 0 10% 0); transform: translateX(-2px); }
      80% { clip-path: inset(90% 0 5% 0); transform: translateX(2px); }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(0,200,255,0.2), 0 0 40px rgba(0,200,255,0.1); }
      50% { box-shadow: 0 0 30px rgba(0,200,255,0.4), 0 0 60px rgba(0,200,255,0.2); }
    }
    @keyframes border-rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes modal-in {
      from { opacity: 0; transform: scale(0.9) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes counter-up {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes data-stream {
      0% { transform: translateY(-100%); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(100vh); opacity: 0; }
    }
    @keyframes dash-spin {
      to { stroke-dashoffset: -100; }
    }

    .anim-fade-up { animation: fadeSlideUp 0.7s ease forwards; }
    .anim-delay-1 { animation-delay: 0.1s; opacity: 0; }
    .anim-delay-2 { animation-delay: 0.2s; opacity: 0; }
    .anim-delay-3 { animation-delay: 0.3s; opacity: 0; }
    .anim-delay-4 { animation-delay: 0.4s; opacity: 0; }
    .anim-delay-5 { animation-delay: 0.5s; opacity: 0; }

    /* NAV */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 20px 48px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border-dim);
      background: linear-gradient(180deg, rgba(2,4,8,0.95) 0%, transparent 100%);
      backdrop-filter: blur(20px);
    }
    .nav-logo {
      font-family: var(--font-display);
      font-size: 18px; font-weight: 900;
      color: var(--cyan);
      letter-spacing: 4px;
      text-shadow: 0 0 20px var(--cyan);
      display: flex; align-items: center; gap: 10px;
    }
    .nav-logo-icon {
      width: 32px; height: 32px;
      border: 1px solid var(--border-active);
      display: flex; align-items: center; justify-content: center;
      position: relative;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      background: var(--cyan-glow);
    }
    .nav-links { display: flex; align-items: center; gap: 32px; }
    .nav-link {
      font-family: var(--font-arabic); font-size: 14px; font-weight: 500;
      color: var(--text-secondary); text-decoration: none;
      letter-spacing: 0.5px; transition: color 0.2s;
      cursor: pointer;
    }
    .nav-link:hover { color: var(--cyan); }
    .nav-cta {
      font-family: var(--font-mono); font-size: 12px; font-weight: 500;
      color: var(--bg-void); background: var(--cyan);
      border: none; padding: 10px 24px;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      cursor: pointer; letter-spacing: 1px; text-transform: uppercase;
      transition: all 0.2s;
    }
    .nav-cta:hover { background: var(--electric); box-shadow: 0 0 20px var(--cyan); }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 120px 48px 80px;
      position: relative; overflow: hidden;
    }
    .hero-glow {
      position: absolute; width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,200,255,0.08) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      border: 1px solid var(--border-subtle);
      background: var(--cyan-deep);
      padding: 6px 16px; margin-bottom: 32px;
      font-family: var(--font-mono); font-size: 11px;
      color: var(--cyan); letter-spacing: 2px; text-transform: uppercase;
    }
    .hero-badge-dot {
      width: 6px; height: 6px; background: var(--cyan); border-radius: 50%;
      box-shadow: 0 0 8px var(--cyan);
      animation: pulse-glow 2s ease infinite;
    }
    .hero-title {
      font-family: 'Cairo Play', sans-serif;
      font-size: clamp(44px, 7.5vw, 96px);
      font-weight: 900; line-height: 1.05;
      letter-spacing: -1px;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .hero-title-accent {
      color: transparent;
      -webkit-text-stroke: 1px var(--cyan);
      text-shadow: none;
      position: relative; display: inline-block;
    }
    .hero-title-accent::after {
      content: attr(data-text);
      position: absolute; inset: 0;
      color: var(--cyan);
      filter: blur(8px); opacity: 0.4;
      -webkit-text-stroke: 0;
    }
    .hero-subtitle {
      font-family: var(--font-arabic);
      font-size: clamp(16px, 2.5vw, 22px);
      color: var(--text-secondary);
      max-width: 680px; margin: 24px auto 48px;
      line-height: 1.8; font-weight: 300;
    }
    .hero-stats {
      display: flex; align-items: center; gap: 48px;
      justify-content: center; margin-top: 64px;
    }
    .hero-stat-num {
      font-family: var(--font-display); font-size: 32px; font-weight: 900;
      color: var(--cyan);
    }
    .hero-stat-label {
      font-family: var(--font-arabic); font-size: 13px;
      color: var(--text-muted); margin-top: 4px;
    }
    .hero-stat-divider {
      width: 1px; height: 48px;
      background: linear-gradient(180deg, transparent, var(--border-subtle), transparent);
    }
    .hero-scroll-hint {
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      color: var(--text-muted); font-family: var(--font-mono); font-size: 10px;
      letter-spacing: 2px; animation: float 3s ease infinite;
    }

    /* SECTION */
    .section { padding: 100px 48px; position: relative; }
    .section-label {
      font-family: var(--font-mono); font-size: 11px;
      color: var(--cyan); letter-spacing: 4px; text-transform: uppercase;
      margin-bottom: 16px; display: flex; align-items: center; gap: 12px;
    }
    .section-label::before {
      content: ''; display: block;
      width: 32px; height: 1px; background: var(--cyan);
    }
    .section-title {
      font-family: var(--font-arabic); font-size: clamp(28px, 4vw, 48px);
      font-weight: 800; line-height: 1.2;
      margin-bottom: 16px;
    }
    .section-desc {
      color: var(--text-secondary); font-size: 16px;
      line-height: 1.8; max-width: 560px;
    }

    /* SERVICE CARDS */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1px;
      margin-top: 64px;
      background: var(--border-dim);
      border: 1px solid var(--border-dim);
      position: relative;
    }
    .service-card {
      background: var(--bg-card);
      padding: 36px 32px;
      position: relative; overflow: hidden;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
      display: flex; flex-direction: column;
    }
    .service-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }
    .service-card:hover::before { transform: translateX(0); }
    .service-card::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0,200,255,0.06) 0%, transparent 70%);
      opacity: 0; transition: opacity 0.4s;
    }
    .service-card:hover::after { opacity: 1; }
    .service-card:hover {
      background: var(--bg-elevated);
      transform: translateY(-4px);
    }
    .service-card.featured {
      background: linear-gradient(135deg, var(--bg-elevated) 0%, rgba(0,200,255,0.05) 100%);
      border: 1px solid var(--border-subtle);
    }
    .card-corner {
      position: absolute; top: 0; right: 0;
      width: 0; height: 0;
      border-style: solid;
      border-width: 0 32px 32px 0;
      border-color: transparent var(--cyan) transparent transparent;
      opacity: 0; transition: opacity 0.3s;
    }
    .service-card:hover .card-corner { opacity: 1; }

    .card-num {
      font-family: var(--font-display); font-size: 11px;
      color: var(--text-muted); letter-spacing: 3px;
      margin-bottom: 20px;
    }
    .card-icon-wrap {
      width: 56px; height: 56px;
      border: 1px solid var(--border-subtle);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px; position: relative;
      transition: all 0.3s;
    }
    .service-card:hover .card-icon-wrap {
      border-color: var(--border-active);
      box-shadow: 0 0 20px var(--cyan-glow), inset 0 0 20px var(--cyan-deep);
    }
    .card-icon-wrap svg { color: var(--cyan); transition: all 0.3s; }
    .service-card:hover .card-icon-wrap svg { filter: drop-shadow(0 0 8px var(--cyan)); }

    .card-tag {
      font-family: var(--font-mono); font-size: 9px;
      color: var(--cyan); letter-spacing: 2px;
      background: var(--cyan-deep); border: 1px solid var(--border-subtle);
      padding: 3px 10px; display: inline-block; margin-bottom: 16px;
      text-transform: uppercase;
    }
    .card-title-ar {
      font-family: var(--font-arabic); font-size: 18px; font-weight: 700;
      color: var(--text-primary); margin-bottom: 8px; line-height: 1.4;
    }
    .card-title-en {
      font-family: var(--font-mono); font-size: 11px;
      color: var(--text-muted); letter-spacing: 1px;
      text-transform: uppercase; margin-bottom: 20px;
    }
    .card-desc {
      font-size: 14px; color: var(--text-secondary);
      line-height: 1.7; flex: 1; margin-bottom: 28px;
    }
    .card-features {
      list-style: none; margin-bottom: 28px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .card-feature {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: var(--text-secondary);
      font-family: var(--font-arabic);
    }
    .card-feature-dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--cyan); flex-shrink: 0;
      box-shadow: 0 0 6px var(--cyan);
    }

    .card-price {
      display: flex; align-items: baseline; gap: 6px;
      margin-bottom: 24px;
    }
    .card-price-label {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--text-muted); letter-spacing: 1px;
    }
    .card-price-value {
      font-family: var(--font-display); font-size: 22px; font-weight: 700;
      color: var(--cyan);
    }

    .card-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border-subtle);
      color: var(--cyan);
      font-family: var(--font-mono); font-size: 12px;
      letter-spacing: 2px; text-transform: uppercase;
      padding: 14px 24px;
      cursor: pointer; transition: all 0.3s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
      position: relative; overflow: hidden;
    }
    .card-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--cyan);
      transform: translateX(-100%);
      transition: transform 0.3s ease;
    }
    .card-btn:hover::before { transform: translateX(0); }
    .card-btn:hover { color: var(--bg-void); border-color: var(--cyan); }
    .card-btn span, .card-btn svg { position: relative; z-index: 1; }

    .card-featured-badge {
      position: absolute; top: 20px; left: 20px;
      font-family: var(--font-mono); font-size: 9px;
      color: var(--gold); border: 1px solid var(--gold);
      padding: 3px 10px; letter-spacing: 2px; text-transform: uppercase;
      background: rgba(240, 165, 0, 0.05);
    }

    /* MODAL */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(2, 4, 8, 0.92);
      backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      animation: fadeIn 0.3s ease;
    }
    .modal-box {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      width: 100%; max-width: 520px;
      position: relative; overflow: hidden;
      animation: modal-in 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .modal-box::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    }
    .modal-glow {
      position: absolute; top: -100px; left: 50%; transform: translateX(-50%);
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(0,200,255,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .modal-header {
      padding: 32px 36px 0;
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 16px; position: relative;
    }
    .modal-close {
      width: 32px; height: 32px; flex-shrink: 0;
      border: 1px solid var(--border-subtle);
      background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); transition: all 0.2s;
    }
    .modal-close:hover { color: var(--cyan); border-color: var(--border-active); }

    .modal-service-tag {
      display: inline-flex; align-items: center; gap: 8px;
      border: 1px solid var(--border-subtle); background: var(--cyan-deep);
      padding: 6px 14px; margin-bottom: 16px;
      font-family: var(--font-mono); font-size: 10px;
      color: var(--cyan); letter-spacing: 1px;
    }
    .modal-title {
      font-family: var(--font-arabic); font-size: 20px; font-weight: 700;
      color: var(--text-primary); line-height: 1.6;
    }
    .modal-body { padding: 24px 36px 36px; }
    .modal-divider {
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-subtle), transparent);
      margin: 24px 0;
    }
    .modal-methods-label {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--text-muted); letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 16px;
      text-align: center;
    }
    .modal-buttons { display: flex; flex-direction: column; gap: 12px; }

    .auth-btn {
      width: 100%; padding: 15px 20px;
      border: 1px solid var(--border-subtle);
      background: var(--bg-elevated);
      cursor: pointer; transition: all 0.3s;
      display: flex; align-items: center; gap: 14px;
      font-family: var(--font-arabic); font-size: 15px; font-weight: 500;
      color: var(--text-primary);
      position: relative; overflow: hidden;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    }
    .auth-btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, var(--cyan-deep), transparent);
      opacity: 0; transition: opacity 0.3s;
    }
    .auth-btn:hover::before { opacity: 1; }
    .auth-btn:hover {
      border-color: var(--border-active);
      transform: translateX(-4px);
    }
    .auth-btn:hover .auth-btn-icon { filter: drop-shadow(0 0 6px var(--cyan)); }
    .auth-btn-icon {
      width: 36px; height: 36px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px; position: relative; z-index: 1;
    }
    .auth-btn-text { position: relative; z-index: 1; flex: 1; text-align: right; }
    .auth-btn-arrow {
      position: relative; z-index: 1;
      color: var(--text-muted); transition: all 0.3s;
      opacity: 0;
    }
    .auth-btn:hover .auth-btn-arrow { opacity: 1; color: var(--cyan); transform: translateX(-4px); }

    .auth-btn.google { }
    .auth-btn.facebook { }
    .auth-btn.apple { }
    .auth-btn.email { }
    .auth-btn.apple.hidden { display: none; }

    .modal-footer {
      padding: 0 36px 28px;
      font-family: var(--font-arabic); font-size: 12px;
      color: var(--text-muted); text-align: center; line-height: 1.6;
    }
    .modal-footer a { color: var(--cyan); text-decoration: none; }

    /* LOADING STATE */
    .loading-overlay {
      position: fixed; inset: 0; z-index: 2000;
      background: var(--bg-void);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 24px;
      animation: fadeIn 0.3s ease;
    }
    .loading-logo {
      font-family: var(--font-display); font-size: 24px; font-weight: 900;
      color: var(--cyan); letter-spacing: 8px;

        const animate = () => {
          ringX += (mouseX - ringX) * 0.12; ringY += (mouseY - ringY) * 0.12;
          ring.style.left = ringX + 'px'; ring.style.top = ringY + 'px';
          requestAnimationFrame(animate);

        const unhover = () => ring.classList.remove('hovering');

          el.addEventListener('mouseenter', hover);
          el.addEventListener('mouseleave', unhover);

        animate();
        return () => window.removeEventListener('mousemove', move);

            name: method === 'email' ? 'مستخدم مميز' : `مستخدم ${method}`,
            method,
            email: `user@nexus.agency`,
            avatar: method.charAt(0).toUpperCase(),
          };
          onAuth(mockUser);
        }, 1800);
      };

      const methods = [
        {
          id: 'google',
          label: 'تسجيل بواسطة غوغل',
          icon: (
            <svg width="22" height="22" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
          ),
          bg: 'rgba(66,133,244,0.1)',
        },
        {
          id: 'facebook',
          label: 'تسجيل بواسطة فيسبوك',
          icon: (
            <svg width="22" height="22" viewBox="0 0 24 24">
              <path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
          ),
          bg: 'rgba(24,119,242,0.1)',
        },
        ...(showApple ? [{
          id: 'apple',
          label: 'تسجيل بواسطة آبل',
          icon: (
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
              <path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.54 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09z"/>
              <path d="M15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701"/>
            </svg>
          ),
          bg: 'rgba(255,255,255,0.05)',
        }] : []),
        {
          id: 'email',
          label: 'التسجيل بالبريد الإلكتروني',
          icon: <Icon name="mail" size={20} style={{ color: '#00c8ff' }} />,
          bg: 'rgba(0,200,255,0.08)',
        },
      ];

      return (
        <div className="modal-backdrop" onClick={(e) => e.target === e.currentTarget && !loading && onClose()}>
          <div className="modal-box">
            <div className="modal-glow" />
            <div className="modal-header">
              <div style={{ flex: 1 }}>
                <div className="modal-service-tag">
                  <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--cyan)', boxShadow: '0 0 8px var(--cyan)', display: 'inline-block' }} />
                  <span>الخدمة المختارة: {service?.titleAr}</span>
                </div>
                <h2 className="modal-title">خطوة واحدة تفصلنا عن البدء بمشروعك!</h2>
                <p style={{ fontSize: 14, color: 'var(--text-secondary)', marginTop: 8, lineHeight: 1.6 }}>
                  سجل دخولك لحفظ اختيارك والانتقال للوحة التحكم
                </p>
              </div>
              {!loading && (
                <button className="modal-close" onClick={onClose}>
                  <Icon name="x" size={14} />
                </button>
              )}
            </div>

            <div className="modal-body">
              <div className="modal-divider" />
              <p className="modal-methods-label">اختر طريقة التسجيل</p>

              <div className="modal-buttons">
                {methods.map((m) => (
                  <button
                    key={m.id}
                    className={`auth-btn ${m.id}`}
                    onClick={() => !loading && handleAuth(m.id)}
                    disabled={!!loading}
                    style={{ opacity: loading && loading !== m.id ? 0.5 : 1 }}
                  >
                    <span className="auth-btn-icon" style={{ background: m.bg, borderRadius: 6 }}>
                      {loading === m.id ? (
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" strokeWidth="2" style={{ animation: 'spin-slow 0.8s linear infinite' }}>
                          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                        </svg>
                      ) : m.icon}
                    </span>
                    <span className="auth-btn-text">{loading === m.id ? 'جارٍ التحقق...' : m.label}</span>
                    <span className="auth-btn-arrow"><Icon name="arrow" size={14} /></span>
                  </button>
                ))}
              </div>
            </div>

            <div className="modal-footer">
              بالمتابعة، أنت توافق على <a href="#">شروط الخدمة</a> و<a href="#">سياسة الخصوصية</a>
            </div>
          </div>
        </div>
      );
    };

    // ─── DASHBOARD ──────────────────────────────────────────────
    const Dashboard = ({ user, service, onLogout }) => {
      const timeline = [
        { step: 'STEP 01', label: 'استلام الطلب', desc: 'تم استلام طلبك وتحليل المتطلبات بنجاح', active: true },
        { step: 'STEP 02', label: 'مرحلة التصميم', desc: 'فريق التصميم يعمل على النماذج الأولية', active: false },
        { step: 'STEP 03', label: 'التطوير والبرمجة', desc: 'مرحلة البناء والتطوير الفعلي', active: false },
        { step: 'STEP 04', label: 'الاختبار والتسليم', desc: 'اختبار شامل ثم تسليم المشروع', active: false },
      ];

      return (
        <div className="dashboard">
          <div className="dash-header">
            <div>
              <p className="dash-welcome">// CLIENT PORTAL — NEXUS AGENCY</p>
              <h1 className="dash-title">مرحباً بك في لوحة التحكم</h1>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginTop: 12 }}>
                <div className="dash-status">
                  <span className="dash-status-dot" />
                  <span>ACTIVE SESSION</span>
                </div>
                <span style={{ color: 'var(--border-subtle)' }}>•</span>
                <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--text-muted)', letterSpacing: 1 }}>
                  ID: {user.id}
                </span>
              </div>
            </div>
            <div>
              <div className="dash-user-card">
                <div className="dash-avatar">{user.avatar}</div>
                <div>
                  <div className="dash-user-name">{user.name}</div>
                  <div className="dash-user-meta">via {user.method?.toUpperCase()}</div>
                  <div className="dash-user-meta">{user.email}</div>
                </div>
              </div>
              <button className="dash-btn dash-btn-secondary" onClick={onLogout}
                style={{ width: '100%', marginTop: 8, justifyContent: 'center', fontSize: 12 }}>
                <Icon name="logout" size={14} />
                تسجيل الخروج
              </button>
            </div>
          </div>

          {/* SERVICE BANNER */}
          <div className="dash-service-banner">
            <div className="dash-service-icon">
              <Icon name={service.icon} size={28} style={{ color: 'var(--cyan)' }} />
            </div>
            <div style={{ flex: 1 }}>
              <div className="dash-service-id">// {service.tag} — PROJECT INITIATED</div>
              <div className="dash-service-name">{service.titleAr}</div>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--text-muted)', marginTop: 4 }}>
                {service.titleEn} • Delivery in ~{service.deliveryDays} days
              </div>
            </div>
          </div>

          {/* STATS */}
          <div className="dash-grid">
            {[
              { label: 'STATUS', value: 'PENDING', sub: 'في انتظار التأكيد', icon: 'clock' },
              { label: 'PROGRESS', value: '5%', sub: 'بداية المشروع', icon: 'trending' },
              { label: 'MESSAGES', value: '0', sub: 'لا توجد رسائل بعد', icon: 'msg' },
              { label: 'DEADLINE', value: `${service.deliveryDays}d`, sub: 'الوقت المتوقع للتسليم', icon: 'star' },
            ].map(w => (
              <div className="dash-widget" key={w.label}>
                <div className="dash-widget-label">{w.label}</div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <Icon name={w.icon} size={16} style={{ color: 'var(--text-muted)' }} />
                  <div className="dash-widget-value">{w.value}</div>
                </div>
                <div className="dash-widget-sub">{w.sub}</div>
              </div>
            ))}
          </div>

          {/* TIMELINE */}
          <div className="dash-timeline">
            <div className="dash-timeline-title">// PROJECT TIMELINE</div>
            {timeline.map((item, i) => (
              <div className="timeline-item" key={i}>
                <div className={`timeline-dot ${item.active ? 'active' : ''}`}>
                  <div className="timeline-dot-inner" />
                </div>
                <div className="timeline-content">
                  <div className="timeline-step">{item.step}</div>
                  <div className="timeline-label">{item.label}</div>
                  <div className="timeline-desc">{item.desc}</div>
                </div>
                {item.active && (
                  <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: '#00ff88',
                    display: 'flex', alignItems: 'center', gap: 6, flexShrink: 0 }}>
                    <span style={{ width: 6, height: 6, borderRadius: '50%', background: '#00ff88',
                      boxShadow: '0 0 8px #00ff88', display: 'inline-block' }} />
                    CURRENT
                  </div>
                )}
              </div>
            ))}
          </div>

          <div className="dash-actions">
            <button className="dash-btn dash-btn-primary">
              <Icon name="msg" size={16} />
              تواصل مع فريقنا
            </button>
            <button className="dash-btn dash-btn-secondary">
              <Icon name="send" size={16} />
              إرسال ملفات المشروع
            </button>
            <button className="dash-btn dash-btn-secondary">
              <Icon name="layers" size={16} />
              عرض التفاصيل الكاملة
            </button>
          </div>
        </div>
      );
    };

    // ─── LANDING ─────────────────────────────────────────────────
    const Landing = ({ onSelect }) => {
      return (
        <div>
          {/* NAV */}
          <nav className="nav">
            <div className="nav-logo">
              <div className="nav-logo-icon">
                <Icon name="zap" size={14} style={{ color: 'var(--cyan)' }} />
              </div>
              NEXUS
            </div>
            <div className="nav-links">
              <span className="nav-link">الخدمات</span>
              <span className="nav-link">الأعمال</span>
              <span className="nav-link">من نحن</span>
              <span className="nav-link">التسعير</span>
            </div>
            <button className="nav-cta">ابدأ مشروعك</button>
          </nav>

          {/* HERO */}
          <section className="hero">
            <div className="hero-glow" />
            <div className="hero-badge anim-fade-up anim-delay-1">
              <span className="hero-badge-dot" />
              وكالة رقمية مستقبلية — DIGITAL AGENCY
            </div>
            <h1 className="hero-title anim-fade-up anim-delay-2">
              نبني<br />
              <span className="hero-title-accent" data-text="مستقبلك">مستقبلك</span>
              <br />الرقمي
            </h1>
            <p className="hero-subtitle anim-fade-up anim-delay-3">
              من المواقع الاحترافية إلى التطبيقات المتقدمة — نحوّل أفكارك إلى منتجات رقمية تُحدث فرقاً حقيقياً في السوق
            </p>
            <div className="hero-stats anim-fade-up anim-delay-4">
              <div>
                <div className="hero-stat-num">+200</div>
                <div className="hero-stat-label">مشروع مكتمل</div>
              </div>
              <div className="hero-stat-divider" />
              <div>
                <div className="hero-stat-num">98%</div>
                <div className="hero-stat-label">رضا العملاء</div>
              </div>
              <div className="hero-stat-divider" />
              <div>
                <div className="hero-stat-num">5★</div>
                <div className="hero-stat-label">تقييم متوسط</div>
              </div>
            </div>
            <div className="hero-scroll-hint">
              <svg width="16" height="24" viewBox="0 0 16 24" fill="none">
                <rect x="0.5" y="0.5" width="15" height="23" rx="7.5" stroke="currentColor" strokeOpacity="0.3"/>
                <circle cx="8" cy="8" r="2" fill="currentColor" opacity="0.6">
                  <animate attributeName="cy" from="8" to="16" dur="1.5s" repeatCount="indefinite"/>
                  <animate attributeName="opacity" from="0.6" to="0" dur="1.5s" repeatCount="indefinite"/>
                </circle>
              </svg>
              <span>SCROLL</span>
            </div>
          </section>

          {/* SERVICES */}
          <section className="section" style={{ paddingTop: 20 }}>
            <div className="section-label anim-fade-up anim-delay-1">خدماتنا المتكاملة</div>
            <h2 className="section-title anim-fade-up anim-delay-2">اختر خدمتك <span style={{ color: 'var(--cyan)' }}>المثالية</span></h2>
            <p className="section-desc anim-fade-up anim-delay-3">
              كل مشروع يبدأ باختيار ذكي. اختر الخدمة التي تناسب احتياجاتك وسنتولى الباقي بإتقان.
            </p>

            <div className="cards-grid anim-fade-up anim-delay-4">
              {SERVICES.map((svc) => (
                <div
                  key={svc.id}
                  className={`service-card ${svc.featured ? 'featured' : ''}`}
                  onClick={() => onSelect(svc)}
                >
                  <div className="card-corner" />
                  {svc.featured && <div className="card-featured-badge">⭐ الأكثر طلباً</div>}
                  <div className="card-num">// {svc.num}</div>
                  <div className="card-icon-wrap">
                    <Icon name={svc.icon} size={24} />
                  </div>
                  <div className="card-tag">{svc.tag}</div>
                  <h3 className="card-title-ar">{svc.titleAr}</h3>
                  <div className="card-title-en">{svc.titleEn}</div>
                  <p className="card-desc">{svc.desc}</p>
                  <ul className="card-features">
                    {svc.features.map((f, i) => (
                      <li key={i} className="card-feature">
                        <span className="card-feature-dot" />
                        {f}
                      </li>
                    ))}
                  </ul>
                  <button className="card-btn" onClick={(e) => { e.stopPropagation(); onSelect(svc); }}>
                    <span>اطلب الآن</span>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                      <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
                    </svg>
                  </button>
                </div>
              ))}
            </div>
          </section>

          {/* PROCESS */}
          <section className="section" style={{ background: 'linear-gradient(180deg, transparent, rgba(0,200,255,0.02), transparent)' }}>
            <div className="section-label">كيف نعمل</div>
            <h2 className="section-title">العملية <span style={{ color: 'var(--cyan)' }}>الإبداعية</span></h2>
            <div className="process-steps">
              {[
                { num: '01', icon: 'msg', title: 'التحليل والاستشارة', desc: 'نفهم مشروعك ونحلل احتياجاتك بعمق' },
                { num: '02', icon: 'layers', title: 'التصميم والتخطيط', desc: 'نضع خارطة الطريق ونصمم النماذج' },
                { num: '03', icon: 'code', title: 'التطوير والبرمجة', desc: 'نبني المنتج بأعلى معايير الجودة' },
                { num: '04', icon: 'send', title: 'التسليم والدعم', desc: 'نطلق المنتج ونقدم دعماً متواصلاً' },
              ].map((s) => (
                <div key={s.num} className="process-step">
                  <div className="process-num">{s.num}</div>
                  <div className="process-icon"><Icon name={s.icon} size={28} /></div>
                  <div className="process-title">{s.title}</div>
                  <div className="process-desc">{s.desc}</div>
                </div>
              ))}
            </div>
          </section>

          {/* FOOTER */}
          <footer className="footer">
            <div className="footer-logo">NEXUS</div>
            <p>© 2026 NEXUS DIGITAL AGENCY — جميع الحقوق محفوظة</p>
            <p style={{ marginTop: 8, opacity: 0.5 }}>Built with precision. Crafted for the future.</p>
          </footer>
        </div>
      );
    };

    // ─── LOADING SCREEN ──────────────────────────────────────────
    const LoadingScreen = ({ onDone }) => {
      useEffect(() => { const t = setTimeout(onDone, 2000); return () => clearTimeout(t); }, []);
      return (
        <div className="loading-overlay">
          <div className="loading-logo">NEXUS</div>
          <div className="loading-bar"><div className="loading-bar-fill" /></div>
          <div className="loading-text">INITIALIZING DASHBOARD...</div>
        </div>
      );
    };

    // ─── APP ROOT ────────────────────────────────────────────────
    const App = () => {
      const [screen, setScreen] = useState('landing'); // landing | loading | dashboard
      const [selectedService, setSelectedService] = useState(null);
      const [showModal, setShowModal] = useState(false);
      const [pendingService, setPendingService] = useState(null);
      const [user, setUser] = useState(null);
      const [toast, setToast] = useState(null);

      const handleSelect = (svc) => {
        setPendingService(svc);
        setShowModal(true);
      };

      const handleAuth = (u) => {
        setUser(u);
        setShowModal(false);
        setSelectedService(pendingService);
        setScreen('loading');
      };

      const handleLoadDone = () => {
        setScreen('dashboard');
        setToast(`مرحباً ${user.name}! تم تفعيل لوحة التحكم بنجاح 🎉`);
      };

      const handleLogout = () => {
        setUser(null); setSelectedService(null);
        setPendingService(null); setScreen('landing');
        setToast('تم تسجيل الخروج بأمان');
      };

      return (
        <>
          <CursorEffect />
          {screen === 'loading' && <LoadingScreen onDone={handleLoadDone} />}
          {screen === 'landing' && <Landing onSelect={handleSelect} />}
          {screen === 'dashboard' && user && selectedService && (
            <Dashboard user={user} service={selectedService} onLogout={handleLogout} />
          )}
          {showModal && pendingService && (
            <AuthModal
              service={pendingService}
              onClose={() => setShowModal(false)}
              onAuth={handleAuth}
            />
          )}
          {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
        </>
      );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
